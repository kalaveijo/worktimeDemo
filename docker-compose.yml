services:
  postgres:
    image: postgres:16-alpine
    container_name: workhours-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workhours}
      POSTGRES_USER: ${POSTGRES_USER:-workhours}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workhours_local_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workhours} -d ${POSTGRES_DB:-workhours}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
